<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}bdsnode{% endblock %}</title>
  {% block head %}{% endblock %}
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { surface: { DEFAULT: '#0f1117', card: '#161b27', border: '#1e2535' } } } }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.2/dist/htmx.min.js"></script>
  <style>
    body { background-color: #0f1117; color: #e2e8f0; }
    /* ── nav ── */
    .nav-link {
      display: inline-flex; align-items: center; gap: 0.375rem;
      padding: 0.4rem 0.875rem; border-radius: 0.5rem;
      font-size: 0.8125rem; font-weight: 500;
      color: #94a3b8; border: 1px solid transparent;
      transition: color 120ms, background 120ms, border-color 120ms;
      white-space: nowrap; text-decoration: none;
    }
    .nav-link:hover { color: #e2e8f0; background: rgba(255,255,255,0.06); border-color: #2d3748; }
    .nav-link.active { color: #93c5fd; background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.35); }
    /* ── cards / chrome ── */
    .card { background: #161b27; border: 1px solid #1e2535; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 500; }
    .btn { padding: 0.45rem 1rem; border-radius: 0.375rem; font-size: 0.8125rem; font-weight: 500; transition: background 150ms; cursor: pointer; border: none; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    /* ── form controls ── */
    input, select {
      background: #0f1117; border: 1px solid #1e2535; color: #e2e8f0;
      border-radius: 0.375rem;
    }
    input:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
    /* ── table ── */
    table { width: 100%; border-collapse: collapse; }
    th { color: #64748b; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em;
         padding: 0.5rem 0.75rem; border-bottom: 1px solid #1e2535; text-align: left; }
    td { padding: 0.55rem 0.75rem; border-bottom: 1px solid #131927; font-size: 0.8125rem; vertical-align: top; }
    tr:hover td { background: #1a2030; }
    /* ── htmx indicator ── */
    .htmx-indicator { opacity: 0; transition: opacity 200ms; }
    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator { opacity: 1; }
  </style>
</head>
<body class="min-h-full">

  <!-- ── Navigation ─────────────────────────────────────────────────────────── -->
  <nav style="background:#0a0d14; border-bottom:1px solid #1a2235;" class="sticky top-0 z-50 px-5 py-3">
    <div class="max-w-screen-xl mx-auto flex items-center gap-1">

      <!-- Logo -->
      <a href="/" class="flex items-center gap-2 text-blue-400 font-bold text-sm mr-3 shrink-0" style="text-decoration:none">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7c0-2-1-3-3-3H7C5 4 4 5 4 7z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6M9 8h6M9 16h4"/>
        </svg>
        bdsnode
      </a>

      <!-- Divider -->
      <div style="width:1px; height:1.25rem; background:#1e2535;" class="mr-2 shrink-0"></div>

      <!-- Nav items -->
      <a href="/"          class="nav-link {% block nav_dashboard %}{% endblock %}">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="/telemetry" class="nav-link {% block nav_telemetry %}{% endblock %}">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Telemetry
      </a>
      <a href="/logs"      class="nav-link {% block nav_logs %}{% endblock %}">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Logs
      </a>
      <a href="/docs"      class="nav-link {% block nav_docs %}{% endblock %}">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
        Documents
      </a>
      <a href="/search"    class="nav-link {% block nav_search %}{% endblock %}">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Agg. Search
      </a>
      <a href="/trends"    class="nav-link {% block nav_trends %}{% endblock %}">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        Trends
      </a>
      <a href="/bund"      class="nav-link {% block nav_bund %}{% endblock %}">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        Bund
      </a>
    </div>
  </nav>

  <!-- ── Page content ──────────────────────────────────────────────────────── -->
  <main class="max-w-screen-xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  {% block page_scripts %}{% endblock %}
</body>
</html>
