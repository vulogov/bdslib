<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}bdsnode{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: { DEFAULT: '#0f1117', card: '#161b27', border: '#1e2535' },
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.2/dist/htmx.min.js"></script>
  <style>
    body { background-color: #0f1117; color: #e2e8f0; }
    .nav-link { @apply px-3 py-1 rounded text-sm text-slate-400 hover:text-white hover:bg-slate-700 transition-colors; }
    .nav-link.active { @apply text-blue-400 bg-slate-800; }
    .card { background: #161b27; border: 1px solid #1e2535; }
    .badge { @apply inline-block px-2 py-0.5 rounded text-xs font-medium; }
    .btn { @apply px-4 py-2 rounded text-sm font-medium transition-colors cursor-pointer; }
    .btn-primary { @apply bg-blue-600 hover:bg-blue-500 text-white; }
    .btn-ghost  { @apply border border-slate-600 hover:border-slate-400 text-slate-300; }
    input, select { background: #0f1117; border: 1px solid #1e2535; color: #e2e8f0; }
    input:focus, select:focus { outline: none; border-color: #3b82f6; }
    table { width: 100%; border-collapse: collapse; }
    th { color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
         padding: 0.5rem 0.75rem; border-bottom: 1px solid #1e2535; text-align: left; }
    td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #1a2030; font-size: 0.875rem;
         vertical-align: top; }
    tr:hover td { background: #1a2030; }
    .htmx-indicator { opacity: 0; transition: opacity 200ms; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .htmx-request.htmx-indicator { opacity: 1; }
  </style>
</head>
<body class="min-h-full">

  <!-- Navigation -->
  <nav style="background:#0d111c; border-bottom:1px solid #1e2535;" class="px-6 py-3 flex items-center gap-1 sticky top-0 z-50">
    <a href="/" class="text-blue-400 font-bold text-base mr-4 flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
      </svg>
      bdsnode
    </a>
    <a href="/"          class="nav-link {% block nav_dashboard  %}{% endblock %}">Dashboard</a>
    <a href="/telemetry" class="nav-link {% block nav_telemetry  %}{% endblock %}">Telemetry</a>
    <a href="/logs"      class="nav-link {% block nav_logs       %}{% endblock %}">Logs</a>
    <a href="/docs"      class="nav-link {% block nav_docs       %}{% endblock %}">Documents</a>
    <a href="/search"    class="nav-link {% block nav_search     %}{% endblock %}">Agg. Search</a>
    <a href="/trends"    class="nav-link {% block nav_trends     %}{% endblock %}">Trends</a>
  </nav>

  <!-- Page content -->
  <main class="max-w-screen-xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  {% block page_scripts %}{% endblock %}
</body>
</html>
